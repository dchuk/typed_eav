name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Push gem to RubyGems
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    environment:
      name: rubygems
      url: https://rubygems.org/gems/typed_eav

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Verify tag matches gem version
        run: |
          gem_version="v$(ruby -r ./lib/typed_eav/version -e 'print TypedEAV::VERSION')"
          tag_version="${GITHUB_REF_NAME}"
          if [ "$gem_version" != "$tag_version" ]; then
            echo "Tag $tag_version does not match gem version $gem_version" >&2
            exit 1
          fi

      - name: Release gem (trusted publishing)
        uses: rubygems/release-gem@v1
