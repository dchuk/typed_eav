# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Pre-1.0 architecture cleanup — ship typed_eav 0.3.0"
  slug: "refactor-0-3-0"
  kind: existing_plan
  tranche: "Continuous execution: implement issues #9 → #10 → #11 → #12 → #13 in dependency order until 0.3.0 is committed and the suite is green."
  status: done
  oracle:
    signal: "bundle exec rspec && bundle exec rubocop green at HEAD; CHANGELOG.md has '## [0.3.0]' entry; lib/typed_eav/version.rb VERSION constant is '0.3.0'; last commit subject is 'chore(release): bump version to 0.3.0'; every acceptance-criterion checkbox in issues #9–#13 maps to a receipted slice."
    cadence: "after each Worker package and at final audit (T999)"
    final_proof: "T999 Judge audit receipt recording full_outcome_complete: true, citing per-issue acceptance-criterion → slice → receipt mapping."
  intake:
    original_request: "issues 8-13"
    interpreted_outcome: "Implement the four refactors from issues #9–#12, ship them as 0.3.0 via issue #13, with the full test suite and rubocop green at HEAD."
    input_shape: existing_plan
    audience: "gem maintainer (dchuk) + future external authors of custom field types"
    authority: approved
    proof_type: test
    completion_proof: "All four refactor commits on main, suite + rubocop green, CHANGELOG written, VERSION bumped to 0.3.0, final release commit landed."
    likely_misfire: "Stopping after #9 (the hardest refactor) lands. The release is not complete until #13's commit lands and the version constant says 0.3.0. Second misfire: skipping README updates from #9 §'Multi-cell field types' and #12 §'Custom field types'."
    blind_spots_considered:
      - "scripts/bump-version.sh is referenced in CLAUDE.md but does NOT exist — #13 falls back to direct edit of lib/typed_eav/version.rb (called out in spec)."
      - "Field::Percentage's class-ivar workaround for value_column re-declaration deepens by one level under #12 — verify Percentage.value_column still returns :decimal_value after the refactor."
      - "spec/lib/typed_eav/versioning/subscriber_spec.rb:329 stubs TypedEAV::FieldStorageContract.new(field_double) — must be rewritten in #9 to use the new direct method shape."
      - "Per-leaf field spec fixtures may silently rely on inverted min/max bounds that #12's grooming fixes turn into save-time errors — grep fixtures before each PR."
      - "rubocop blanket disables on where_typed_eav / typed_eav_hash_for must come OUT in #11, not stay in."
      - "Integration specs (spec/integration/) may surface ordering-dependent failures after all four refactors merge — run end-to-end on main before #13's version bump."
    existing_plan_facts:
      - "Sequencing: #9 → #10 → #11 → #12 → #13 (PRD dependency order; #9 and #12 both touch Field::Base so must be sequential)."
      - "ADRs 0001–0005 are accepted and live in docs/adr/."
      - "Each child issue has a full Technical Spec section (codebase reads, behavior slices, tracer bullet, acceptance criteria mapping, posture, risks)."
      - "Commit format: {type}({scope}): {description} (CLAUDE.md). One commit per slice."
      - "No version bump or push until #13."
      - "VBW plugin isolation: do NOT read/write files in .vbw-planning/ or .planning/."
      - "Do NOT touch EventDispatcher (ADR-0003) or Phase-6 modules (ADR-0005)."
      - "No DB schema changes."
      - "No public API change on host AR models."
      - "Phase 7 (Read Optimization) is an active VBW milestone and is INDEPENDENT of this refactor arc — do not interleave."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/refactor-0-3-0/"
    command: "npx goalbuddy board docs/goals/refactor-0-3-0"

